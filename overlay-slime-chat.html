<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Slime Chat v3.2.4 - RPG Edition</title>
    <link rel="icon" type="image/x-icon" href="https://slime2.stream/favicon.ico" />
    
    <script src="https://code.jquery.com/jquery-3.7.1.slim.min.js" integrity="sha256-kmHvs0B+OpCW5GVHUNjv9rOmY0IvSIRcf7zGUDTDQM8=" crossorigin="anonymous"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;0,1000;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900;1,1000&display=swap');

      /*********************
       * slime2 containers *
       *********************/
      #slime2-event-list {
        --fontName: Nunito;
        --fontSize: 16px;
        --fontWeight: 800;
        --badgeSize: 18px;
        font-family: var(--fontName), Nunito, Helvetica, Arial, sans-serif;
        font-weight: var(--fontWeight);
        font-size: var(--fontSize);
        display: flex;
        overflow: hidden;
        gap: var(--gap);
        position: absolute;
        line-height: var(--lineHeight);
        color: white;
        padding: 20px;
        width: 100%;
        height: 100%;
        box-sizing: border-box;
      }

      .slime2-event {
        flex-shrink: 0;
        width: 100%;
      }

      /*******************************
       * STRUCTURE GLOBALE CONTAINER *
       *******************************/
      /* La boîte invisible qui entoure le pseudo + la ligne de chat */
      .chat-container {
        display: flex;
        flex-direction: column;
        width: 100%;
        margin-bottom: 24px; /* Espace entre les messages de joueurs différents */
      }

      /* On aligne le contenu du container à gauche ou à droite */
      .chat-container.side-left { align-items: flex-start; }
      .chat-container.side-right { align-items: flex-end; }

      /*******************************
       * PSEUDO (Au-dessus)          *
       *******************************/
      .user-badge {
        background: transparent;
        border: none;
        padding: 0 12px 6px 12px; /* Petit espace entre le pseudo et la bulle/avatar en dessous */
        box-shadow: none;
        line-height: 1;
        white-space: nowrap;
      }

      .user {
        color: var(--userColor) !important;
        font-weight: 900;
        font-size: 0.95em;
        text-shadow: 0 1px 2px rgba(0,0,0,0.5) !important;
        padding: 0 !important; 
      }

      .badges {
        display: inline-block;
        margin-left: 4px;
      }

      .badge {
        height: var(--badgeSize);
        margin-left: 2px;
        vertical-align: middle;
      }

      /*******************************
       * LIGNE AVATAR + BULLE        *
       *******************************/
      .chat-row {
        display: flex;
        align-items: flex-end; /* Aligne le bas de l'avatar avec le bas de la bulle */
        gap: 16px;
        max-width: 100%;
      }

      /* Inversion de l'ordre (bulle - avatar) selon le côté */
      .chat-container.side-left .chat-row { flex-direction: row; }
      .chat-container.side-right .chat-row { flex-direction: row-reverse; }

      /*******************************
       * AVATAR                      *
       *******************************/
      .avatar-col {
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        flex-shrink: 0;
      }

      .pokemon-avatar {
        width: 120px; 
        height: 120px;
        min-width: 120px; 
        min-height: 120px;
        object-fit: contain;
        image-rendering: pixelated;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      }

      /*******************************
       * BULLE DE MESSAGE            *
       *******************************/
      .message-col {
        display: flex;
        flex-direction: column;
        max-width: calc(100% - 150px); /* Ajusté pour ne pas déborder sur l'avatar */
      }

      .message {
        background: color-mix(in srgb, var(--userColor) 15%, #ffffff);
        border: none;
        border-radius: 24px;
        padding: 14px 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        box-sizing: border-box;
      }

      /* Pointes SMS vers l'avatar */
      .chat-container.side-left .message { border-bottom-left-radius: 4px; }
      .chat-container.side-right .message { border-bottom-right-radius: 4px; }

      .message .text, .message .content {
        color: #222222 !important;
        font-weight: 700;
        text-shadow: none !important;
      }

      .emote {
        height: 1.75em;
        max-height: 112px;
        display: inline-block;
        vertical-align: middle;
        margin-top: -0.25em;
        margin-bottom: -0.2em;
      }

      .dynamic-emote-sizes .emote-2 .emote { height: var(--emoteMedium); }
      .dynamic-emote-sizes .emote-4 .emote {
        display: block;
        margin: 5px auto;
        height: 150px !important;
        max-height: 150px !important;
        width: auto !important;
      }

      /*******************************
       * ANIMATIONS                  *
       *******************************/
      .chat-container.animation-enter-fade { animation: fade-in 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
      .chat-container.animation-enter-pop { animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
      .chat-container.animation-exit-fade { animation: fade-out 0.3s forwards; }

      @keyframes fade-in { 
        from { opacity: 0; transform: translateY(10px); } 
        to { opacity: 1; transform: translateY(0); } 
      }
      @keyframes pop-in {
        0% { opacity: 0; transform: scale(0.8) translateY(20px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes fade-out { 
        from { opacity: 1; } 
        to { opacity: 0; } 
      }

      /*******************************************************
       * Alignement global de Slime2                         *
       *******************************************************/
      #slime2-event-list.vertical-top-left,
      #slime2-event-list.vertical-top-right { flex-direction: column-reverse; justify-content: start; }
      #slime2-event-list.vertical-bottom-left,
      #slime2-event-list.vertical-bottom-right { flex-direction: column; justify-content: end; }
    </style>

    <script>
      addEventListener('slime2:ready', () => {
        slime2.widget.setData({
          "animations": { "enter": "pop", "exit": "fade" },
          "badges": { "display": true, "size": 18 },
          // Changement par défaut : expiration à 60 secondes au lieu de 300
          "display": { "direction": "vertical", "maxWidth": 1000, "corner": "bottom-left", "under": false, "expiration": 60, "max": 100, "delay": 0, "gap": 24 },
          "emotes": { "static": false, "dynamic": true, "medium": 56, "large": 124 },
          "filters": {
            "botFilters": { "names": ["Sery_Bot", "Nightbot", "StreamElements", "Streamlabs"], "prefixes": ["!"] },
            "userFilters": { "types": ["all", "subs", "mods", "vips", "followers", "artists"], "followHours": null, "users": [] },
            "messageFilters": { "types": [], "words": [] }
          },
          "pronouns": { "display": "hidden" },
          "sound": { "audio": null, "volume": 50 },
          "backgroundStyles": { "color": "transparent", "padding": 0, "fullWidth": false, "borderColor": "transparent", "borderWidth": 0, "borderRadius": 0, "borderStyle": "solid" },
          "textStyles": { "font": "", "size": 28, "lineHeight": 36, "weight": 700, "colon": false, "usernameColorOption": "user", "usernameColor": "white", "textColor": "black", "edge": "none", "edgeColor": "transparent" }
        });
      });
    </script>

    <script>
      addEventListener('slime2:ready', () => {
        slime2.widget.loadSettings('data-slime-chat.js', [
          defineSetting(['Slime Chat RPG Edition', 'Custom Mod by Zaytri'].join('\n'), 'title', 'text-display'),
          animationSettings, badgeSettings, displaySettings, emoteSettings, filterSettings, pronounsSettings, soundSettings, backgroundSettings, textSettings,
        ])
      })

      function defineSetting(label, id, type, options) { return { label, id, type, ...options } }
      function defineOptions(options) { return options.map(option => { const [label, value] = option; return { label, value } }) }

      const displaySettings = defineSetting('Display', 'display', 'group', {
        settings: [
          defineSetting('Direction', 'direction', 'select-input', { defaultValue: 'vertical', options: defineOptions([['Vertical', 'vertical'], ['Horizontal', 'horizontal']]) }),
          defineSetting('Max Message Width (px)', 'maxWidth', 'number-input', { defaultValue: 500, min: 0, step: 1 }),
          defineSetting('Corner', 'corner', 'select-input', { defaultValue: 'bottom-left', options: defineOptions([['Top Left', 'top-left'], ['Top Right', 'top-right'], ['Bottom Left', 'bottom-left'], ['Bottom Right', 'bottom-right']]) }),
          defineSetting('Maximum number of messages', 'max', 'number-input', { defaultValue: 100, min: 0, max: 200, step: 1 }),
          // NOUVEAU CHAMP POUR L'EXPIRATION DES MESSAGES
          defineSetting('Message Expiration (seconds, 0 to disable)', 'expiration', 'number-input', { defaultValue: 60, min: 0, step: 1 }),
          defineSetting('Gap between messages (px)', 'gap', 'number-input', { defaultValue: 10, min: 0, step: 1 }),
        ],
      })
      const emoteSettings = defineSetting('Emotes', 'emotes', 'group', {
        settings: [
          defineSetting('Use dynamic emote sizing', 'dynamic', 'boolean-input', { defaultValue: true }),
          defineSetting('Dynamic size for multiple emotes (px)', 'medium', 'number-input', { defaultValue: 56, slider: true, min: 28, max: 112, step: 1 }),
          defineSetting('Dynamic size for single emote (px)', 'large', 'number-input', { defaultValue: 112, slider: true, min: 28, max: 112, step: 1 }),
        ],
      })
      const badgeSettings = defineSetting('Badges', 'badges', 'group', { settings: [ defineSetting('Show Twitch Badges', 'display', 'boolean-input', { defaultValue: true }), defineSetting('Badge Size (px)', 'size', 'number-input', { defaultValue: 18, min: 0, step: 1 }) ] })
      const pronounsSettings = defineSetting('Pronouns', 'pronouns', 'group', { settings: [ defineSetting('Pronouns Display', 'display', 'select-input', { defaultValue: 'hidden', options: defineOptions([['Lowercase', 'lowercase'], ['Hidden', 'hidden']]) }) ] })
      const botFilterSettings = defineSetting('Bot Filters', 'botFilters', 'group', { settings: [ defineSetting('Bots to hide', 'names', 'text-input', { multiple: true, defaultValue: ['Nightbot'] }), defineSetting('Command prefixes to hide', 'prefixes', 'text-input', { multiple: true, defaultValue: ['!'] }) ] })
      const userFilterSettings = defineSetting('User Filters', 'userFilters', 'group', { settings: [ defineSetting('Show messages from', 'types', 'select-input', { multiple: true, defaultValue: ['all'], options: defineOptions([['Everyone', 'all']]) }) ] })
      const messageFilterSettings = defineSetting('Message Filters', 'messageFilters', 'group', { settings: [ defineSetting('Hide these message types', 'types', 'select-input', { multiple: true, defaultValue: [], options: defineOptions([['First-time chat', 'first']]) }) ] })
      const filterSettings = defineSetting('Filters', 'filters', 'group', { settings: [botFilterSettings, userFilterSettings, messageFilterSettings] })
      const soundSettings = defineSetting('Sound Effect', 'sound', 'group', { settings: [ defineSetting('Sound', 'audio', 'audio-input', {}), defineSetting('Volume (%)', 'volume', 'number-input', { defaultValue: 50, slider: true, min: 0, max: 100, step: 1 }) ] })
      const textSettings = defineSetting('Style Text', 'textStyles', 'group', {
        settings: [
          defineSetting('Font Size (px)', 'size', 'number-input', { defaultValue: 16, min: 0, step: 1 }),
          defineSetting('Line Height (px)', 'lineHeight', 'number-input', { defaultValue: 30, min: 0, step: 1 }),
        ],
      })
      const backgroundSettings = defineSetting('Style Background', 'backgroundStyles', 'group', { settings: [ defineSetting('Background Color', 'color', 'color-input', { defaultValue: 'transparent' }) ] })
      const animationSettings = defineSetting('Animations', 'animations', 'group', {
        settings: [
          defineSetting('Entrance Animation', 'enter', 'select-input', { defaultValue: 'pop', options: defineOptions([['Pop', 'pop'], ['Fade', 'fade'], ['None', 'none']]) }),
          defineSetting('Exit Animation', 'exit', 'select-input', { defaultValue: 'fade', options: defineOptions([['Fade', 'fade'], ['None', 'none']]) }),
        ],
      })
    </script>

    <script>
      let lastUser = null;
      let currentSide = 'left';
      const userAvatars = {};

      const genRanges = [
        { folder: 'icons_output_gen1', min: 0, max: 221 },
        { folder: 'icons_output_gen2', min: 0, max: 143 }, 
        { folder: 'icons_output_gen3', min: 0, max: 157 }, 
        { folder: 'icons_output_gen4', min: 0, max: 134 }, 
        { folder: 'icons_output_gen5', min: 0, max: 181 }, 
        { folder: 'icons_output_gen6', min: 0, max: 95 },  
        { folder: 'icons_output_gen7', min: 0, max: 84 },  
        { folder: 'icons_output_genMEGA', min: 0, max: 60 } 
      ];

      function getRandomPokemonPath() {
        const USE_LOCAL_IMAGES = true;
        const gen = genRanges[Math.floor(Math.random() * genRanges.length)];
        const dexNum = Math.floor(Math.random() * (gen.max - gen.min + 1)) + gen.min;
        const paddedNum = String(dexNum).padStart(3, '0');

        if (USE_LOCAL_IMAGES) {
          return 'assets/pokemon_icon/' + gen.folder + '/pkmn_' + paddedNum + '.png';
        } else {
          const previewDexNum = Math.floor(Math.random() * 800) + 1;
          return 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/' + previewDexNum + '.png';
        }
      }

      function handlePokemonCommand(message) {
        const { text, user } = message;
        if (!text.startsWith('!pkmn')) return false;

        const args = text.split(' ');
        if (args.length < 3) return true;

        const genChoice = parseInt(args[1]);
        const pkmnId = parseInt(args[2]);

        if (genChoice >= 1 && genChoice <= 8 && !isNaN(pkmnId)) {
          const gen = genRanges[genChoice - 1];
          const validatedId = Math.min(Math.max(pkmnId, gen.min), gen.max);
          const paddedNum = String(validatedId).padStart(3, '0');
          userAvatars[user.userName] = 'assets/pokemon_icon/' + gen.folder + '/pkmn_' + paddedNum + '.png';
        }

        return true; 
      }

      addEventListener('slime2:ready', () => {
        slime2.widget.loadPlatform('twitch')
        slime2.onEvent(event => {
          if (event.type === 'message') {
            if (handlePokemonCommand(event.message)) return;
            return onMessage(event.message)
          }
        })
      })

      addEventListener('slime2:widget-data-update', () => {
        const data = slime2.widget.getData()
        const { display, textStyles, animations, emotes, badges, pronouns } = data
        const eventList = $('#slime2-event-list').removeClass()

        slime2.setEventDelay(display.delay * 1000)
        slime2.setMaxEvents(display.max)
        
        // C'EST ICI QUE LE TIMEOUT EST APPLIQUÉ
        slime2.setEventExpiration(
          display.expiration ? display.expiration * 1000 : undefined,
          animations.exit !== 'none' ? { animationTime: 30, animationClass: `animation-exit-${animations.exit}` } : undefined,
        )
        
        eventList.addClass(`${display.direction}-${display.corner}`).css({
          '--maxWidth': `${display.maxWidth}px`,
          '--gap': `${display.gap}px`,
        })

        if (emotes.dynamic) {
          eventList.addClass('dynamic-emote-sizes').css({
            '--emoteMedium': `${emotes.medium}px`,
            '--emoteLarge': `${emotes.large}px`,
          })
        }

        eventList.css({
          '--fontSize': `${textStyles.size}px`,
          '--lineHeight': `${textStyles.lineHeight}px`,
        })

        if (!badges.display) eventList.addClass('hide-badges')
        eventList.css({ '--badgeSize': `${badges.size}px` })
        eventList.addClass(`pronouns-${pronouns.display}`)
      })

      function onMessage(message) {
        if (!evaluateFilters(message)) return
        const { animations, sound } = slime2.widget.getData()
        const { parts, user } = message

        const messageClone = $(slime2.cloneTemplate('message-template'))
        const chatContainer = messageClone.find('.chat-container');

        if (lastUser !== user.userName) {
          currentSide = currentSide === 'left' ? 'right' : 'left';
          lastUser = user.userName;
        }
        chatContainer.addClass(`side-${currentSide}`);

        if (!userAvatars[user.userName]) {
          userAvatars[user.userName] = getRandomPokemonPath();
        }
        chatContainer.find('.pokemon-avatar').attr('src', userAvatars[user.userName]);

        chatContainer.find('.user-badge').append(buildUser(user));
        chatContainer.find('.content').append(buildContent(parts));

        if (animations.enter !== 'none') {
          chatContainer.addClass(`animation-enter-${animations.enter}`);
        }

        chatContainer.css({
          '--userColor': user.color,
          '--userColorLight': slime2.color.light(user.color),
          '--userColorDark': slime2.color.dark(user.color),
        })

        const emoteSize = calculateEmoteSize(parts)
        chatContainer.find('.content').addClass(`emote-${emoteSize}`)

        return {
          fragment: messageClone,
          callback: () => {
            if (sound.audio) {
              const audio = new Audio(sound.audio)
              audio.volume = sound.volume / 100
              audio.play()
            }
          },
        }
      }

      function buildUser(user) {
        const { displayName, userName, badges = [], pronouns } = user
        const userClone = $(slime2.cloneTemplate('user-template'))
        userClone.find('.badges').append(buildBadges(badges))

        let name = displayName
        if (userName && displayName.toLowerCase() !== userName.toLowerCase()) {
          name = `${displayName} (${userName})`
        }

        userClone.find('.pronouns').text(pronouns)
        userClone.find('.name').text(name)
        return userClone
      }

      function buildContent(parts) {
        return parts.map(part => {
          switch (part.type) {
            case 'emote': return buildEmote(part)
            case 'cheer': return buildCheer(part)
            case 'text': default: return buildText(part)
          }
        })
      }

      function buildBadges(badges) {
        return badges.map(badge => {
          const badgeClone = $(slime2.cloneTemplate('badge-template'))
          badgeClone.find('.badge').attr('src', badge.image)
          return badgeClone
        })
      }

      function buildEmote(part) {
        const { emotes } = slime2.widget.getData()
        const { images } = part.emote
        const emoteClone = $(slime2.cloneTemplate('content-emote-template'))
        emoteClone.find('.emote').attr('src', emotes.static ? images.static.x4 : images.default.x4)
        return emoteClone
      }

      function buildCheer(part) {
        const { emotes } = slime2.widget.getData()
        const { amount, color, images } = part.cheer
        const cheerClone = $(slime2.cloneTemplate('content-cheer-template'))
        cheerClone.find('.emote').attr('src', emotes.static ? images.static.x4 : images.default.x4)
        cheerClone.find('.cheer-amount').text(amount).css('color', color)
        return cheerClone
      }

      function buildText(part) {
        const textClone = $(slime2.cloneTemplate('content-text-template'))
        textClone.find('.text').text(part.text)
        return textClone
      }

      function evaluateFilters(message) {
        return evaluateBotFilters(message) && evaluateUserFilters(message) && evaluateMessageFilters(message)
      }
      function evaluateBotFilters(message) {
        const { botFilters } = slime2.widget.getData().filters
        for (const prefix of botFilters.prefixes) if (message.text.startsWith(prefix)) return false
        for (const name of botFilters.names) if (message.user.userName.toLowerCase() === name.toLowerCase()) return false
        return true
      }
      function evaluateUserFilters(message) {
        const { userFilters } = slime2.widget.getData().filters
        for (const name of userFilters.users) if (message.user.userName.toLowerCase() === name.toLowerCase()) return true
        const typeMap = new Map(userFilters.types.map(type => [type, true]))
        if (typeMap.get('all')) return true
        return false
      }
      function evaluateMessageFilters(message) { return true }

      function calculateEmoteSize(parts) {
        let emoteCount = 0, otherCount = 0
        parts.forEach(part => { if (part.type === 'emote') emoteCount++; else if (part.text.trim() !== '') otherCount++; })
        if (otherCount > 0) return 1
        else if (emoteCount > 1) return 2
        return 4
      }
    </script>

    <script type="module" crossorigin src="https://cdn.jsdelivr.net/gh/zaytri/slime2@1.1.5/release/slime2.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/zaytri/slime2@1.1.5/release/slime2.css">
  </head>

  <body>
    <main id="slime2-root"></main>

    <template id="message-template">
      <div class="chat-container">
        <div class="user-badge"></div>
        
        <div class="chat-row">
          <div class="avatar-col">
            <img class="pokemon-avatar" src="" />
          </div>
          <div class="message-col">
            <div class="message">
              <span class="content"></span>
            </div>
          </div>
        </div>
      </div>
    </template>

    <template id="user-template">
      <span class="name"></span><span class="badges"></span><span class="pronouns"></span>
    </template>

    <template id="badge-template"><img class="badge" /></template>

    <template id="content-emote-template"><img class="emote" /></template>

    <template id="content-cheer-template">
      <img class="emote" /><span class="cheer-amount"></span>
    </template>

    <template id="content-text-template"><span class="text"></span></template>
  </body>
</html>
